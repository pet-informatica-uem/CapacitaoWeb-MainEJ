<!DOCTYPE html5>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main EJ</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/main_logo_completa.png" alt="Logo da Main Completo" />
      </div>

      <div class="PagesComponent">
        <nav>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contatos</a></li>
          </ul>
        </nav>

        <div class="LoginButton">
          <p>Login</p>
        </div>
      </div>
    </header>

    <div class="MainComponent">
      <div class="TextComponent">
        <div class="Logos">
          <img src="images/main_logo.png" alt="Ícone Main" />
          <p>X</p>
          <img src="images/PET_logo.png" alt="Logo PET-Informática" />
        </div>
        <div class="Text">
          <p class="Bemvindo">Seja bem vindo!</p>
          <p class="FacaLogin">Faça login para continuar</p>
        </div>
      </div>

      <div class="LoginComponent">
        <p>Login</p>
        <div>
          <input class="Input" placeholder="Username" type="text"/>
        </div>
        <div>
          <input class="Input" placeholder="Password" type="password"/>
        </div>

        <div class="Button">
          <p>Entrar</p>
        </div>

        <p class="Cadastro">
          Não possui cadastro?
          <span>Clique aqui!</span>
        </p>
      </div>
    </div>

    <footer class="footer-site">
      <div class="marca">
        <img src="images/main_logo.png" alt="Logo da Main" />
      </div>
      <p>Feito com ♡ por PET-Informática</p>
    </footer>
  </body>
</html>
